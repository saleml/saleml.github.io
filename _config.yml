title: Salem Lahlou
description: Assistant Professor of Machine Learning

baseurl: ""
url: "https://lahlou.org"
email: salem.lahlou@mbzuai.ac.ae

# Social media links in footer
linkedin: "salemlahlou/"
github: "saleml"
researchgate: "Salem-Lahlou"

# Markdown
highlighter: rouge
markdown: kramdown

# optimization -> compress.html
compress_html:
  clippings: [html,div, p, ul, td, h1, h2, h3, h4,link, meta, footer, nav, img, header, hr, br, head, style, li, ul, ol, time, main, script, title]
  comments: ["<!-- ", " -->"]
  endings: [all]
  ignore:
    envs: [local]
  blanklines: false
  profile: false
  startings: []

sass:
  sass_dir: /assets/css/_sass
  style: compressed

include:
  - _pages

exclude:
  - README.md
  - LICENSE.md
  - old

plugins:
  - jekyll-seo-tag
  - jekyll-email-protect
