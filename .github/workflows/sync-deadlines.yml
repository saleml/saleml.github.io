name: Sync conference deadlines

on:
  schedule:
    - cron: '0 6 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements-deadlines.txt

      - name: Sync deadlines
        run: python scripts/sync_deadlines.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/deadlines.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore(deadlines): sync from ai-deadlines and scrapers"
            git push
          fi
